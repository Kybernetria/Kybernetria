# Sveltia CMS configuration for Codeberg
# OAuth App Redirect URI: https://kybernetria.codeberg.page/admin/

backend:
  name: gitea
  repo: Kybernetria/pages
  branch: dev
  base_url: https://codeberg.org
  api_root: https://codeberg.org/api/v1
  app_id: 784961e2-5b28-4c43-aafe-9615fa7b92b6

media_folder: public/images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: tools
    label: Tools
    folder: src/content/tools
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: GitHub URL, name: github, widget: string }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Status, name: status, widget: select, options: ["active", "stable", "experimental"], default: "active" }
      - { label: Order, name: order, widget: number, default: 0 }
      - { label: Body, name: body, widget: markdown, required: false }
